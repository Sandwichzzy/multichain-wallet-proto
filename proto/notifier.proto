syntax = "proto3";
option go_package = "../protobuf/notifier";
package proto;
import "common.proto";

enum TxType {
  UNKNOWN_TX = 0;
  DEPOSIT = 1;
  WITHDRAW = 2;
}

/// 充值/提币交易通知信息
message depositWithdrawInfo {
  string request_id = 1;  // 通知唯一ID,幂等性
  uint64 block_number = 2;
  string block_hash = 3;
  string tx_hash = 4; 
  string from_address = 5;
  string to_address = 6;
  string amount = 7;
  string fee = 8;
  TxType tx_type = 9;      // 交易类型
  TxStatus status = 10;    // 交易状态
  uint64 confirms = 11;
}

/// 充值/提币通知请求（支持批量）
message depositWithdrawNotifyRequest {
  string consumer_token = 1;
  repeated depositWithdrawInfo dw_txn = 2;
}

/// 通知确认结果
message RetDwNotifyInfo {
  uint64 block_number = 1; // 已成功处理的区块高度
  string block_hash = 2;   // 已确认区块哈希
  string tx_hash = 3;      // 已接收处理的交易哈希
}

/// 充值/提币通知响应
message depositWithdrawNotifyResponse {
  ReturnCode code = 1;
  string msg = 2;
  repeated RetDwNotifyInfo ret_dw_txn = 3;
}

service NotifierServices {
  /// 用于钱包服务向业务系统推送链上交易事件。支持批量通知。
  rpc depositWithdrawNotify(depositWithdrawNotifyRequest) returns (depositWithdrawNotifyResponse) {}
}