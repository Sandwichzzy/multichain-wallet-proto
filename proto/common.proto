syntax = "proto3";

package proto;

option go_package = "../protobuf/common";

// 返回码枚举
enum ReturnCode{
  SUCCESS = 0;
  ERROR = 1;
}

// type 字段支持：eoa（外部账户）、hot（热钱包）、cold（冷钱包）
message PublicKey{
  string type = 1;
  string public_key = 2;
}

// 交易状态枚举
enum TxStatus {
  NotFound = 0; // 未找到
  Pending = 1;  // 待处理
  Confirming = 2;  // 确认中
  Success = 3;  // 成功
  Failed = 4;   // 失败
  ReorgReverted = 5; // 链重组回滚
}


