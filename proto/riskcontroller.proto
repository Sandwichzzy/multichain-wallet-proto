syntax = "proto3";

option go_package = "../protobuf/riskcontroller";
package proto;
import "common.proto";

/// 待检测的链上地址
message AmlAddress {
  string address = 1;
}

// 地址风险类型 示例：
// NORMAL        正常地址
// BLACKLIST     黑名单地址
// SANCTION      制裁地址
// HIGH_RISK     高风险地址
enum AddressRiskType {
  NORMAL = 0;
  BLACKLIST = 1;
  SANCTION = 2;
  HIGH_RISK = 3;
}

/// AML地址检测结果
message RetAmlAddress {
  string address = 1;   // 输入地址
  AddressRiskType address_type = 2;
}

/// AML地址检测请求
message CheckAmlAddressRequest {
  string consumer_token = 1; // 调用方身份凭证（客户端认证token）
  repeated AmlAddress aml_address = 2;  // 待检测地址列表（支持批量）
}

/// AML地址检测响应
message CheckAmlAddressResponse {
  ReturnCode code = 1;
  string msg = 2;  
  repeated RetAmlAddress ret_aml_address = 3;
}

/// 待查询链上交易
message ChainTransaction {
  string tx_hash = 1;
}

/// 链上交易查询结果
message RetChainTransaction {
  string from_address = 1;
  string to_address = 2;
  string amount = 3;
  string fee = 4;
  uint64 confirms = 5;
}

/// 链上交易查询请求
message CheckChainTransactionsRequest {
  string consumer_token = 1;
  repeated ChainTransaction chain_txn =2;  // 待查询交易哈希列表（支持批量）
}

/// 链上交易查询响应
message CheckChainTransactionsResponse {
  ReturnCode code = 1;
  string msg = 2;
  repeated RetChainTransaction ret_chain_txn = 3;
}

/// 业务方传过来待风控检测交易
message UserTransaction {
  string request_id = 1; // 业务请求唯一ID
  string from_address = 2;
  string to_address = 3;
  string amount = 4;
  string token_address = 5;
}

/// 业务方交易风控检测请求
message CheckUserTransactionRequest {
  string consumer_token = 1;
  repeated UserTransaction user_txn = 2;  // 用户交易列表（支持批量）
}

/// 业务方交易风控结果
message RetUserTransaction {
  string request_id = 1;      // 业务请求唯一ID
  string tx_body_hash = 2;   // 原交易体摘要哈希 用于交易原文完整性校验
  string tx_body_risk_hash = 3; // 风控规则处理后风险摘要哈希 用于风控签名、规则指纹校验
}

/// 用户交易风控检测响应
message CheckUserTransactionResponse {
  ReturnCode code = 1;
  string msg = 2;
  repeated RetUserTransaction ret_user_txn = 3;  // 风控结果列表
}

service RiskControllerServices {
  rpc checkAmlAddress(CheckAmlAddressRequest) returns (CheckAmlAddressResponse) {}   /// AML地址风险检测
  rpc checkChainTransactions(CheckChainTransactionsRequest) returns (CheckChainTransactionsResponse) {}  /// 链上交易信息查询与校验
  rpc checkUserTransaction(CheckUserTransactionRequest) returns (CheckUserTransactionResponse) {} /// 用户交易风控摘要生成/风险校验
}