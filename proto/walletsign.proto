syntax = "proto3";
package proto;
option go_package = "../protobuf/walletsign";
import "common.proto";

// 查询链签名方法请求
message ChainSignMethodRequest {
  string consumer_token = 1;  // 调用方身份令牌，用于鉴权和限流
  string chain_id = 2;      // 链名称，例如 "ethereum"、"bitcoin"
  string network = 3;         // 网络类型，例如 "mainnet"、"testnet"
  string asset_type = 4;      // 资产类型，例如 "coin" 或具体代币符号
}


// 查询链签名方法响应
message ChainSignMethodResponse {
  ReturnCode code = 1;        // 返回状态码
  string message = 2;         // 附加信息，成功时可为空，失败时携带错误描述
  string sign_method = 3;                  // 默认方法，保留兼容
  repeated string supported_sign_methods = 4; // 支持的签名方法列表 ecdsa eddsa schnoor
}

// 查询链数据结构定义请求
message ChainSchemaRequest {
  string consumer_token = 1;  // 调用方身份令牌
  string chain_id = 2;      // 链名称
  string network = 3;         // 网络类型
  string asset_type = 4;      // 资产类型
}

// 查询链数据结构定义响应
message ChainSchemaResponse {
  ReturnCode code = 1;        // 返回状态码
  string message = 2;         // 附加信息
  string schema = 3;          // 链的数据结构定义（如交易格式、地址编码规则等），通常为 JSON 字符串
}

// 导出的公钥信息
message ExportPublicKey {
  string public_key = 1;          // 未压缩格式公钥（十六进制字符串）
  string compress_public_key = 2; // 压缩格式公钥（十六进制字符串）
}

// 批量生成密钥对并导出公钥请求
message CreateKeyPairAndExportPublicKeyRequest {
  string consumer_token = 1;  // 调用方身份令牌
  string chain_id = 2;        // 链名称
  string network = 3;         // 网络类型
  uint64 key_num  = 4;        // 需要生成的密钥对数量
  string sign_method = 5;     // 可选签名算法；Bitcoin 支持 "ecdsabitcoin"、"schnorr"，其他链为空时使用默认算法
}

// 批量生成密钥对并导出公钥响应
message CreateKeyPairAndExportPublicKeyResponse{
  ReturnCode code = 1;                    // 返回状态码
  string message = 2;                     // 附加信息
  repeated ExportPublicKey public_key_list = 3; // 生成的公钥列表，顺序与内部生成顺序一致
}

// 包含地址的公钥信息
message ExportPublicKeyWithAddress {
  string public_key = 1;          // 未压缩格式公钥
  string compress_public_key = 2; // 压缩格式公钥
  string address = 3;             // 根据指定格式生成的链上地址
}

// 批量生成密钥对并返回公钥及地址请求
message CreateKeyPairsWithAddressesRequest {
  string consumer_token = 1;  // 调用方身份令牌
  string chain_id = 2;        // 链名称
  string network = 3;         // 网络类型
  string address_format = 4;  // 地址格式要求，例如 "p2pkh"、"bech32"、"checksum"
  uint64 key_num  = 5;        // 需要生成的密钥对数量
  string sign_method = 6;     // 可选签名算法；Bitcoin 支持 "ecdsabitcoin"、"schnorr"，其他链为空时使用默认算法
}

// 批量生成密钥对并返回公钥及地址响应
message CreateKeyPairsWithAddressesResponse{
  ReturnCode code = 1;                                // 返回状态码
  string message = 2;                                 // 附加信息
  repeated ExportPublicKeyWithAddress public_key_addresses = 3; // 公钥与地址列表
}

message TransactionBody {
  string request_id = 1;
  string from_address = 2;
  string to_address = 3;
  string amount = 4;
  string token_address = 5;
}

// 单条待签名消息（基于消息哈希）
message SignTransactionMessage {
  string public_key = 1;    // 签名所使用的公钥（用于定位对应私钥）
  string message_hash = 2;  // 待签名的消息哈希（32字节十六进制字符串）
  string risk_key_hash = 3;
  string wallet_key_hash = 4;
  TransactionBody tx_body = 5;
  string sign_method = 6;   // 可选签名算法；Bitcoin 支持 "ecdsabitcoin"、"schnorr"，其他链为空时使用默认算法
}

// 批量签名消息请求
message SignTransactionsMessageRequest {
  string consumer_token = 1;                      // 调用方身份令牌
  string chain_id = 2;                          // 链名称
  string network = 3;                             // 网络类型
  repeated SignTransactionMessage sign_txn_msg = 4; // 待签名消息列表
}

// 单条消息签名结果
message MsgWithSignature {
  string message_hash = 1;  // 原始消息哈希
  string signature = 2;     // 签名结果（十六进制字符串）
  bool is_success = 3;      // 该条签名是否成功
}

// 批量签名消息响应
message SignTransactionsMessageResponse {
  ReturnCode Code = 1;                         // 返回状态码（整体请求级）
  string message = 2;                          // 附加信息
  string signature = 3;                        // 全局签名（根据业务定义，可能为聚合签名或空）
  repeated MsgWithSignature msg_with_signature = 4; // 每一条消息对应的签名详情
}

// 待构建并签名的原始交易信息
message TransactionMessage {
  string public_key = 1;      // 用于签名的公钥（定位私钥）
  string wallet_key_hash = 2; // 钱包密钥哈希（部分链用于地址验证）
  string risk_key_hash = 3;   // 风控相关密钥哈希（可选）
  string tx_base64_body = 4;  // Base64 编码的未签名交易体
}

// 钱包签名服务定义
service WalletSignService {
  // 获取指定链的签名方法标识
  rpc getChainSignMethod(ChainSignMethodRequest) returns(ChainSignMethodResponse){}

  // 获取指定链的数据结构定义
  rpc getChainSchema(ChainSchemaRequest) returns(ChainSchemaResponse) {}

  // 批量生成密钥对，仅导出公钥列表（不包含地址）
  rpc createKeyPairsExportPublicKeyList(CreateKeyPairAndExportPublicKeyRequest) returns (CreateKeyPairAndExportPublicKeyResponse) {}

  // 批量生成密钥对，同时返回公钥与对应的链上地址
  rpc createKeyPairsWithAddresses(CreateKeyPairsWithAddressesRequest) returns (CreateKeyPairsWithAddressesResponse) {}

  // 对消息哈希进行批量签名（传入公钥定位私钥）只负责“签”,不组装交易,会校验wallet_key_hash、risk_key_hash
  rpc signTransactionsMessage(SignTransactionsMessageRequest) returns (SignTransactionsMessageResponse) {}

}