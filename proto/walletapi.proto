syntax = "proto3";
option go_package = "../protobuf/walletapi";
package proto;
import "proto/common.proto";


// 通用响应结构
message CommonResponse {
  ReturnCode code = 1; // 返回码
  string msg = 2;      // 返回信息
}

// 节点端点信息
message EndPoint {
  string url = 1; // 节点URL地址
}

// 支持的链信息
message SupportChain {
  string chain_name = 1;          // 链名称，如 Ethereum、Bitcoin
  string chain_id = 2;            // 链ID，唯一标识
  string network = 3;             // 网络类型，如 mainnet、testnet
  repeated EndPoint end_point = 4; // 该链可用的节点端点列表
}

// 获取支持链列表的请求
message SupportChainRequest {
  string consumer_token = 1; // 消费者令牌，用于API认证和授权，标识调用方身份
}

// 获取支持链列表的响应
message SupportChainResponse {
  ReturnCode code = 1;               // 返回码
  string msg = 2;                    // 返回信息
  repeated SupportChain chains = 3;  // 支持的链列表
}

// 地址信息
message Addresses {
  string address = 1; // 区块链地址字符串
  string public_key =2;
}

// 转换地址请求（将公钥转换为地址）
message ConvertAddressesRequest {
  string consumer_token = 1;      // 消费者令牌，用于API认证
  string chain_id = 2;            // 链ID
  string network = 3;             // 网络类型
  string address_format = 4;      // 地址格式，如 hex、bech32
  repeated PublicKey public_key = 5; // 待转换的公钥列表
}

// 转换地址响应
message ConvertAddressesResponse{
  ReturnCode code = 1;                // 返回码
  string msg = 2;                     // 返回信息
  repeated Addresses address = 3;     // 转换后的地址列表
}

// 地址有效性验证结果
message AddressesValid {
  string address = 1; // 地址字符串
  bool valid = 2;     // 是否有效
}

// 验证地址有效性请求
message ValidAddressesRequest {
  string consumer_token = 1;       // 消费者令牌，用于API认证
  string chain_id = 2;             // 链ID
  string network = 3;              // 网络类型
  repeated Addresses addresses = 4; // 待验证的地址列表
}

// 验证地址有效性响应
message ValidAddressesResponse {
  ReturnCode code = 1;                       // 返回码
  string msg = 2;                            // 返回信息
  repeated AddressesValid address_valid = 3; // 地址验证结果列表
}

// 获取最新区块请求
message LastestBlockRequest {
  string consumer_token = 1; // 消费者令牌，用于API认证
  string chain_id = 2;       // 链ID
  string network = 3;        // 网络类型
}

// 获取最新区块响应
message LastestBlockResponse {
  ReturnCode code = 1;   // 返回码
  string msg = 2;        // 返回信息
  uint64 height = 3;     // 最新区块高度
  string hash = 4;       // 最新区块哈希
  string parent_hash=5;  // 最新区块的parent区块hash,回滚处理
  uint64 timestamp=6;    // 最新区块产生时间，回滚判断处理
}

// 交易发送方信息
message FromAddress {
  string address = 1;   // 发送方地址
  string amount = 2;    // 发送金额（字符串格式，避免精度丢失）
  string meta_data = 3; // 附加元数据，如 memo、data 字段
}

// 交易接收方信息
message ToAddress {
  string address = 1;   // 接收方地址
  string amount = 2;    // 接收金额（字符串格式）
  string meta_data = 3; // 附加元数据
}

// 交易明细
message TransactionDetails {
  string tx_hash = 1;            // 交易哈希
  string fee = 2;                // 交易手续费（字符串格式）
  TxStatus status = 3;             // 交易状态（参考 TxStatus 枚举）
  uint32 txType = 4;             // 交易类型，如普通转账、合约调用,ERC20转账
  string contract_address = 5;   // 合约地址（如果是合约调用）
  repeated FromAddress from = 6; // 发送方列表,以太坊只有一个，btc会有多个vin vout
  repeated ToAddress to = 7;     // 接收方列表
}

// 获取区块请求（可通过高度或哈希）
message BlockRequest {
  string consumer_token = 1;  // 消费者令牌，用于API认证
  string chain_id = 2;        // 链ID
  string network = 3;         // 网络类型
  string hash_height = 4;     // 区块哈希或高度（字符串格式）
  bool is_block_hash = 5;     // 是否为区块哈希（true: hash_height是哈希，false: 是高度）
}

// 获取区块响应
message BlockResponse{
  ReturnCode code = 1;                      // 返回码
  string msg = 2;                           // 返回信息
  string height = 3;                        // 区块高度
  string hash = 4;                          // 区块哈希
  repeated TransactionDetails transactions = 5; // 区块中的交易列表
}

// 根据交易哈希查询交易请求
message TransactionByHashRequest{
  string consumer_token = 1; // 消费者令牌，用于API认证
  string chain_id = 2;       // 链ID
  string network = 3;        // 网络类型
  string hash = 4;           // 交易哈希
}

// 根据交易哈希查询交易响应
message TransactionByHashResponse {
  ReturnCode code = 1;               // 返回码
  string msg = 2;                    // 返回信息
  TransactionDetails transaction = 3;   // 交易详情
}

// 根据地址查询交易列表请求
message TransactionByAddressRequest {
  string consumer_token = 1;   // 消费者令牌，用于API认证
  string chain_id = 2;         // 链ID
  string network = 3;          // 网络类型
  string address = 4;          // 查询地址
  string contract_address = 5; // 可选，合约地址，仅查询与该合约相关的交易（ERC20交易）
  uint64 page = 6;             // 页码（从1开始）
  uint64 page_size = 7;        // 每页数量
}

// 根据地址查询交易列表响应
message TransactionByAddressResponse {
  ReturnCode code = 1;                       // 返回码
  string msg = 2;                            // 返回信息
  repeated TransactionDetails transaction = 3;  // 交易列表
}

// 查询账户余额请求
message AccountBalanceRequest {
  string consumer_token = 1;   // 消费者令牌，用于API认证
  string chain_id = 2;         // 链ID
  string network = 3;          // 网络类型
  string address = 4;          // 账户地址
  string contract_address = 5; // 可选，合约地址，查询代币余额时使用
}

// 查询账户余额响应
message AccountBalanceResponse {
  ReturnCode code = 1;   // 返回码
  string msg = 2;        // 返回信息
  string network = 3;    // 网络类型
  string balance = 4;    // 余额（字符串格式，避免精度丢失）
}

// 原始交易数据（未签名或已签名的十六进制/Base64编码）
message RawTransaction {
  string raw_tx = 1; // 原始交易数据的编码字符串
}

// 发送交易请求（批量）
message SendTransactionsRequest{
  string consumer_token = 1;        // 消费者令牌，用于API认证
  string chain_id = 2;              // 链ID
  string network = 3;               // 网络类型
  repeated RawTransaction raw_tx = 4; // 待发送的原始交易列表
}

// 单笔交易发送返回结果
message RawTransactionReturn {
  string tx_hash = 1;    // 交易哈希
  bool is_success = 2;   // 是否成功广播
  string message = 3;    // 附加信息（如失败原因）
}

// 发送交易响应
message SendTransactionsResponse {
  ReturnCode code = 1;                         // 返回码
  string msg = 2;                              // 返回信息
  repeated RawTransactionReturn txn_ret = 3;   // 每笔交易的广播结果
}

// 获取交易Schema请求（用于构建未签名交易）
message TransactionSchemaRequest{
  string consumer_token = 1; // 消费者令牌，用于API认证
  string chain_id = 2;       // 链ID
  string network = 3;        // 网络类型
}

// 获取交易Schema响应
message TransactionSchemaResponse{
  ReturnCode code = 1;   // 返回码
  string msg = 2;        // 返回信息
  string schema = 3;     // JSON Schema，描述构建交易所需的字段结构
}

// Base64编码的交易数据
message Base64Transaction  {
  string base64_tx = 1; // Base64编码的交易数据（通常是未签名的交易）
}

// 未签名交易的消息哈希
message UnsignedTransactionMessageHash {
  string unsigned_tx = 1; // 待签名的交易哈希或消息
}

// 构建未签名交易请求（批量）
message UnSignTransactionRequest {
  string consumer_token = 1;                 // 消费者令牌，用于API认证
  string chain_id = 2;                       // 链ID
  string network = 3;                        // 网络类型
  repeated Base64Transaction base64_txn = 4; // Base64编码的未签名交易列表
}

// 构建未签名交易响应
message UnSignTransactionResponse {
  ReturnCode code = 1;                                 // 返回码
  string msg = 2;                                      // 返回信息
  repeated UnsignedTransactionMessageHash unsigned_txn = 3; // 待签名的消息哈希列表
}

// 携带签名的Base64交易
message Base64TransactionWithSignature {
  string base64_tx = 1;  // Base64编码的原始交易（未签名部分）
  string signature = 2;  // 签名数据（十六进制或Base64）
  string public_key = 3; // 公钥（用于验证签名）
}

// 已签名交易及哈希
message SignedTxWithHash {
  string signed_tx = 1;   // 已签名的完整交易（编码字符串）
  string tx_hash = 2;     // 交易哈希
  bool is_success = 3;    // 签名验证是否成功
}

// 提交已签名交易请求（批量）
message SignedTransactionRequest {
  string consumer_token = 1;                               // 消费者令牌，用于API认证
  string chain_id = 2;                                     // 链ID
  string network = 3;                                      // 网络类型
  repeated Base64TransactionWithSignature txn_with_signature = 4; // 携带签名的交易列表
}

// 提交已签名交易响应
message SignedTransactionResponse {
  ReturnCode code = 1;                     // 返回码
  string msg = 2;                          // 返回信息
  repeated SignedTxWithHash signed_txn = 3; // 签名处理后的交易列表
}

// 授权合约信息
message ApproveContractList {
  string address = 1; // 已授权的合约地址
}

// 查询地址授权列表请求（Web3钱包常用）
message AddressApproveListRequest {
  string consumer_token = 1; // 消费者令牌，用于API认证
  string chain_id = 2;       // 链ID
  string network = 3;        // 网络类型
  string address = 4;        // 待查询的地址
}

// 查询地址授权列表响应
message AddressApproveListResponse {
  ReturnCode code = 1;                       // 返回码
  string msg = 2;                            // 返回信息
  repeated ApproveContractList contracts = 3; // 已授权的合约列表
}

// 钱包API网关服务定义
service WalletApiGateWayService {
  // 链的支持层面
  rpc getSupportChains(SupportChainRequest) returns (SupportChainResponse) {}

  // 地址层面的操作
  rpc convertAddresses(ConvertAddressesRequest) returns(ConvertAddressesResponse){} // 公钥转地址
  rpc validAddresses(ValidAddressesRequest) returns(ValidAddressesResponse){}       // 验证地址有效性

  // 获取链上数据
  rpc getLastestBlock(LastestBlockRequest) returns (LastestBlockResponse) {}                   // 获取最新区块
  rpc getBlock(BlockRequest) returns (BlockResponse) {}                                        // 获取指定区块
  rpc getTransactionByHash (TransactionByHashRequest) returns (TransactionByHashResponse) {}   // 根据哈希查交易
  rpc getTransactionByAddress (TransactionByAddressRequest) returns (TransactionByAddressResponse) {} // 根据地址查交易列表
  rpc getAccountBalance(AccountBalanceRequest) returns (AccountBalanceResponse) {}             // 查询账户余额

  // 构建与发送交易
  rpc sendTransaction(SendTransactionsRequest) returns (SendTransactionsResponse) {}               // 广播已签名交易
  rpc buildTransactionSchema(TransactionSchemaRequest)returns(TransactionSchemaResponse){}        // 获取交易构造Schema
  rpc buildUnSignTransaction(UnSignTransactionRequest) returns(UnSignTransactionResponse){}       // 构建未签名交易，返回待签名哈希
  rpc buildSignedTransaction(SignedTransactionRequest) returns(SignedTransactionResponse){}       // 提交签名后的交易

  // Web3 钱包扩展功能
  rpc getAddressApproveList(AddressApproveListRequest) returns(AddressApproveListResponse){} // 获取地址授权合约列表
}